<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gorfti Gold</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 60px 20px 80px;
    font-family: 'Montserrat', sans-serif;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .container {
    width: 100%; max-width: 480px;
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    position: relative; z-index: 1;
  }
  .profile {
    display: flex; flex-direction: column;
    align-items: center;
    margin-bottom: 24px;
  }
  .avatar {
    width: 100px; height: 100px;
    border-radius: 50%;
    overflow: hidden;
    border: 1.5px solid rgba(201,168,76,0.4);
    margin-bottom: 18px;
    position: relative;
  }
  .avatar::before {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 0%, #c9a84c 30%, transparent 60%, #c9a84c 80%, transparent 100%);
    opacity: 0.3;
    z-index: -1;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .profile-name { font-family:'Cinzel',serif; font-size:20px; letter-spacing:6px; color:#fff; text-align:center; }
  .profile-gold { font-family:'Cinzel',serif; font-size:11px; letter-spacing:8px; color:#c9a84c; margin-top:4px; }
  .profile-line { width:60px; height:1px; background:linear-gradient(to right,transparent,#c9a84c,transparent); margin:14px auto; }
  .profile-bio { font-family:'Montserrat',sans-serif; font-weight:200; font-size:11px; letter-spacing:3px; color:#666; text-align:center; text-transform:uppercase; }
  .profile-country { font-size:13px; color:#c9a84c; margin-top:8px; letter-spacing:2px; }

  .btn {
    width: 100%;
    display: flex; align-items: center; gap: 16px;
    padding: 16px 24px;
    border: 1px solid rgba(201,168,76,0.25);
    background: rgba(255,255,255,0.02);
    text-decoration: none;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative; overflow: hidden;
    animation: slideIn 0.6s ease forwards; opacity: 0;
  }
  .btn:nth-child(1){animation-delay:.1s}
  .btn:nth-child(2){animation-delay:.2s}
  .btn:nth-child(3){animation-delay:.3s}
  .btn:nth-child(4){animation-delay:.4s}
  .btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(201,168,76,0.06) 0%,transparent 100%); opacity:0; transition:opacity 0.3s; }
  .btn:hover { border-color:rgba(201,168,76,0.6); transform:translateY(-2px); }
  .btn:hover::before { opacity:1; }
  .btn-icon { width:38px; height:38px; border-radius:50%; background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.25); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
  .btn-content { flex:1; }
  .btn-title { font-family:'Cinzel',serif; font-size:12px; letter-spacing:2px; color:#fff; }
  .btn-sub { font-family:'Montserrat',sans-serif; font-weight:200; font-size:9px; letter-spacing:2px; color:#555; margin-top:3px; text-transform:uppercase; }
  .btn-arrow { font-size:11px; color:rgba(201,168,76,0.4); }
  .btn-primary { border-color:rgba(201,168,76,0.5); background:rgba(201,168,76,0.05); }
  .btn-primary .btn-title { color:#c9a84c; }
  .btn-disabled { opacity:0.3; pointer-events:none; }
  .soon { font-family:'Montserrat',sans-serif; font-size:7px; letter-spacing:3px; color:#c9a84c; text-transform:uppercase; border:1px solid rgba(201,168,76,0.3); padding:2px 6px; margin-left:8px; }

  @keyframes slideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  .footer { margin-top:44px; font-family:'Cinzel',serif; font-size:8px; letter-spacing:4px; color:rgba(201,168,76,0.18); }
</style>
</head>
