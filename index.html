<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bijouterie Casablanca — Liens utiles</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 60px 20px 80px;
    font-family: 'Montserrat', sans-serif;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.09) 0%, transparent 65%);
    pointer-events: none;
  }
  .container {
    width: 100%; max-width: 480px;
    display: flex; flex-direction: column;
    align-items: center; gap: 14px;
    position: relative; z-index: 1;
  }
  .profile { display:flex; flex-direction:column; align-items:center; margin-bottom:28px; }
  .avatar {
    width: 140px; height: 140px; border-radius: 50%;
    overflow: hidden; margin-bottom: 20px;
    border: 1.5px solid rgba(201,168,76,0.5);
    box-shadow: 0 0 40px rgba(201,168,76,0.14);
  }
  .avatar img { width:100%; height:100%; object-fit:cover; }
  .profile-name { font-family:'Cinzel',serif; font-size:18px; letter-spacing:6px; color:#fff; text-align:center; white-space:nowrap; }
  .profile-line { width:70px; height:1px; background:linear-gradient(to right,transparent,#c9a84c,transparent); margin:16px auto; }
  .profile-bio { font-family:'Montserrat',sans-serif; font-weight:200; font-size:10px; letter-spacing:4px; color:#666; text-align:center; text-transform:uppercase; }

.btn {
width: 100%; display:flex; align-items:center; gap:16px;
padding: 15px 22px;
border: 1px solid rgba(201,168,76,0.22);
background: rgba(255,255,255,0.02);
text-decoration: none; cursor: pointer;
transition: all 0.3s ease; position:relative; overflow:hidden;
animation: slideIn 0.6s ease forwards; opacity:0;
}
.btn:nth-child(1){animation-delay:.1s}
.btn:nth-child(2){animation-delay:.2s}
.btn:nth-child(3){animation-delay:.3s}
.btn:nth-child(4){animation-delay:.4s}
.btn::before { content:’’; position:absolute; inset:0; background:linear-gradient(135deg,rgba(201,168,76,0.06),transparent); opacity:0; transition:opacity 0.3s; }
.btn:hover { border-color:rgba(201,168,76,0.55); transform:translateY(-2px); box-shadow:0 8px 30px rgba(201,168,76,0.08); }
.btn:hover::before { opacity:1; }
.btn-icon { width:42px; height:42px; border-radius:50%; overflow:hidden; flex-shrink:0; }
.btn-icon img { width:100%; height:100%; object-fit:cover; }
.btn-content { flex:1; }
.btn-title { font-family:‘Cinzel’,serif; font-size:12px; letter-spacing:2px; color:#fff; }
.btn-sub { font-family:‘Montserrat’,sans-serif; font-weight:200; font-size:8.5px; letter-spacing:2.5px; color:#555; margin-top:3px; text-transform:uppercase; }
.btn-arrow { font-size:12px; color:rgba(201,168,76,0.35); font-family:‘Cinzel’,serif; }
.btn-primary { border-color:rgba(201,168,76,0.45); background:rgba(201,168,76,0.04); }
.btn-primary .btn-title { color:#c9a84c; }
.btn-disabled { opacity:0.3; pointer-events:none; }
.soon { font-family:‘Montserrat’,sans-serif; font-size:7px; letter-spacing:3px; color:#c9a84c; border:1px solid rgba(201,168,76,0.35); padding:2px 7px; margin-left:8px; vertical-align:middle; }
@keyframes slideIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.footer { margin-top:44px; font-family:‘Cinzel’,serif; font-size:7px; letter-spacing:5px; color:rgba(201,168,76,0.15); text-align:center; }
</style>

</head>
